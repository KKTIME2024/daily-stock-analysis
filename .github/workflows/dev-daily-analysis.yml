name: 每日分析(dev)

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv pip install --system efinance openai python-dotenv ddgs

      - name: Run analysis
        env:
          LLM_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CUSTOM_WEBHOOK_URLS: ${{ secrets.CUSTOM_WEBHOOK_URLS }}
        run: python dev/run.py
