name: 每日分析(dev)

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install efinance openai python-dotenv ddgs

      - name: Run analysis
        env:
          LLM_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CUSTOM_WEBHOOK_URLS: ${{ secrets.CUSTOM_WEBHOOK_URLS }}
        run: .venv/bin/python dev/run.py
